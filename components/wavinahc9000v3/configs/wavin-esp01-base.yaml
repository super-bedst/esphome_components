# Base config for Wavin AHC-9000 v3 on ESP-01 (ESP8266) — merge into your node YAML
# Repo: https://github.com/super-bedst/esphome_components

substitutions:
  device_name: wavin
  friendly_name: Wavin
  log_level: DEBUG
  update_interval: 60s
  tx_enable_pin: GPIO2
  rx_pin: GPIO3
  tx_pin: GPIO1

esphome:
  name: ${device_name}
  project:
    name: home.wavin_gulvvarme
    version: "2.0.0"

esp8266:
  board: esp01_1m

logger:
  baud_rate: 0
  level: ${log_level}
  logs:
    wavinahc9000v3: DEBUG

api:
  services:
    - service: dump_wavin_yaml
      then:
        - lambda: 'id(wavin).generate_yaml_suggestion();'

ota:
  - platform: esphome
    password: !secret ota_pass

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  use_address: 192.168.10.8
  domain: .local
  ap:
    ssid: "Wavin Fallback Hotspot"
    password: !secret ap_pass

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/super-bedst/esphome_components
      ref: main
    refresh: 0s
    components: [wavinahc9000v3]

uart:
  id: uart_wavin
  rx_pin: ${rx_pin}
  tx_pin: ${tx_pin}
  baud_rate: 38400
  stop_bits: 1
  parity: NONE

wavinahc9000v3:
  id: wavin
  uart_id: uart_wavin
  update_interval: ${update_interval}
  tx_enable_pin: ${tx_enable_pin}
  # keep_standby_alive: true
  # standby_keepalive_interval: 180s
  channel_01_friendly_name: "Køkken"
  channel_02_friendly_name: "Værelse NV"
  channel_03_friendly_name: "Bad Vest"
  channel_04_friendly_name: "Værelse SV"
  channel_05_friendly_name: "Multirum"
  channel_06_friendly_name: "Værelse SØ"
  channel_07_friendly_name: "Depot"
  channel_08_friendly_name: "Stue"
  channel_09_friendly_name: "Bad Øst"
  channel_10_friendly_name: "Gang"
  channel_11_friendly_name: "Værksted"
  channel_12_friendly_name: "Garage"
  channel_13_friendly_name: "Redskabsskur"
  channel_14_friendly_name: "Soveværelse"
  channel_15_friendly_name: "Kontor"
  channel_16_friendly_name: "Entre"

packages:
  wavin_entities: !include entities_16_channels.yaml
