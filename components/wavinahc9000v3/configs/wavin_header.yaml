########################################################################################
#  WAVIN AHC-9000 — ESPHome 2026.5 + wavinahc9000v3 (super-bedst fork)
#  Baseret på oprindelig config af Heine Koldbro Madsen / Samuel Sieb (2021)
#  https://github.com/super-bedst/esphome_components
########################################################################################

substitutions:
  device_name: wavin
  friendly_name: Wavin
  log_level: DEBUG
  # Hvor ofte hubben kører (lavere = hurtigere opdatering af alle zoner)
  update_interval: 15s

  channel_1: Køkken
  channel_2: Værelse NV
  channel_3: Bad Vest
  channel_4: Værelse SV
  channel_5: Multirum
  channel_6: Værelse SØ
  channel_7: Depot
  channel_8: Stue
  channel_9: Bad Øst
  channel_10: Gang
  channel_11: Værksted
  channel_12: Garage
  channel_13: Redskabsskur
  channel_14: Soveværelse
  channel_15: Kontor
  channel_16: Entre

  temp_step: "0.5"
  climate_min_temp: "3"
  climate_max_temp: "40"

  # Din tidligere ESP32-ledninger (Super Mini / C3)
  tx_enable_pin: GPIO1
  rx_pin: GPIO3
  tx_pin: GPIO4

esphome:
  name: ${device_name}
  project:
    name: home.wavin_gulvvarme
    version: "2.1.0"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  level: ${log_level}
  logs:
    wavinahc9000v3: DEBUG

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_pass

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  use_address: 192.168.10.8
  domain: .local
  ap:
    ssid: "Wavin Fallback Hotspot"
    password: !secret ap_pass

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/super-bedst/esphome_components
      ref: main
    refresh: 0s
    components: [wavinahc9000v3]

uart:
  id: uart_wavin
  rx_pin: ${rx_pin}
  tx_pin: ${tx_pin}
  baud_rate: 38400
  stop_bits: 1
  parity: NONE

wavinahc9000v3:
  id: wavin
  uart_id: uart_wavin
  update_interval: ${update_interval}
  # Standard er 2: kun 2 kanaler læses fra bussen per cyklus (resten er "gamle" værdier)
  poll_channels_per_cycle: 16
  tx_enable_pin: ${tx_enable_pin}
  channel_01_friendly_name: "${channel_1}"
  channel_02_friendly_name: "${channel_2}"
  channel_03_friendly_name: "${channel_3}"
  channel_04_friendly_name: "${channel_4}"
  channel_05_friendly_name: "${channel_5}"
  channel_06_friendly_name: "${channel_6}"
  channel_07_friendly_name: "${channel_7}"
  channel_08_friendly_name: "${channel_8}"
  channel_09_friendly_name: "${channel_9}"
  channel_10_friendly_name: "${channel_10}"
  channel_11_friendly_name: "${channel_11}"
  channel_12_friendly_name: "${channel_12}"
  channel_13_friendly_name: "${channel_13}"
  channel_14_friendly_name: "${channel_14}"
  channel_15_friendly_name: "${channel_15}"
  channel_16_friendly_name: "${channel_16}"
